# iOS 端内嵌 runtime 的裁剪版 config（随 AgentKit 打进 bundle，由 AgentRuntime 读取）。
#
# 与服务端全量 config 的差异（均为 iOS 沙盒/单 key 约束所致）：
#   1. 去掉 `workspace` 块 —— 工作区根由 MobileStart 的 workspaceDir 参数（= Documents）决定，
#      不能让 config.workspace.root 覆盖，否则 relativize/re-anchor + 项目列表全失效。
#   2. 去掉 `hooks` —— gofmt / run_command 走 sh -c（fork/exec），iOS 沙盒禁。
#   3. 只保留 deepseek / deepseek-pro —— 仅注入了 DEEPSEEK_API_KEY；qwen/glm/ollama 需各自的
#      key 或 localhost，故不在 iOS 暴露。
#
# 注意：api_key_env 只引用环境变量名，key 由 secretsJSON 注入（走 Keychain），此文件不含明文密钥。

default_model: gateway

credentials:
  gateway:
    default:
      source: injected
  llm:
    deepseek:
      source: env
      env: DEEPSEEK_API_KEY
    qwen:
      source: env
      env: DASHSCOPE_API_KEY
    glm:
      source: env
      env: GLM_API_KEY

models:
  gateway:
    provider: openai
    base_url: "__GATEWAY_BASE_URL__"
    model: ""                                       # Gateway 服务端选择默认模型
    credential:
      namespace: gateway
      name: default
    context_window: 128000

  deepseek:
    provider: openai
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-flash"
    credential:
      namespace: llm
      name: deepseek
    temperature: 0.2
    context_window: 128000
    input_price_per_million: 0.27
    output_price_per_million: 1.10
    cache_input_price_per_million: 0.027

  deepseek-pro:
    provider: openai
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-pro"
    credential:
      namespace: llm
      name: deepseek
    context_window: 128000
    
agent:
  max_steps: 33
  max_parallel_tools: 4
  compact_ratio: 0.75
  subagent_model: deepseek
  client_tool_timeout_seconds: 900


provider:
  request_timeout_seconds: 600
  max_retries: 5
  backoff_millis: 500
  max_backoff_seconds: 8

web:
  search:
    provider: gateway
    gateway_base_url: "__GATEWAY_BASE_URL__"
    credential:
      namespace: gateway
      name: default
    top_k: 5
    # Local debugger override; production can use the 120s example default.
    gateway_timeout_seconds: 600

runtime:
  max_concurrent_turns: 5

currency: "$"
